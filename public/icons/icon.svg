<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#b400ff"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.6"/>
  <!-- Inner hexagon shape -->
  <polygon points="256,80 420,168 420,344 256,432 92,344 92,168" fill="none" stroke="#00d4ff" stroke-width="4" opacity="0.3" filter="url(#neon)"/>
  <!-- CMD text -->
  <text x="256" y="230" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="80" fill="#00d4ff" filter="url(#neon)">CMD</text>
  <!-- Center line -->
  <line x1="140" y1="260" x2="372" y2="260" stroke="url(#glow)" stroke-width="2" opacity="0.5"/>
  <!-- CTR text -->
  <text x="256" y="320" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="60" fill="#b400ff" filter="url(#neon)">CTR</text>
  <!-- Small dots decoration -->
  <circle cx="130" cy="140" r="4" fill="#00ff88" opacity="0.8"/>
  <circle cx="382" cy="140" r="4" fill="#00ff88" opacity="0.8"/>
  <circle cx="130" cy="372" r="4" fill="#ffd700" opacity="0.8"/>
  <circle cx="382" cy="372" r="4" fill="#ffd700" opacity="0.8"/>
  <!-- Pulse ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
</svg>
